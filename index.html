                </button>

        </div>

                Player 2 Score
            </div>
            <div class="score score2">
                0
            </div>
            <div class = "marker marker2">
                O
            </div>
        </div>
    </div>
    
    <div class = "buttons">                                  <!--Buttons-->

        <button class = "btn1 btn">RESTART</button>              <!--Game Restart Button-->
        <button class = "btn2 btn">RESET SCORES</button>         <!--Score Reset Button-->

    </div>

    <div class = "footer">                                   <!--End Section-->
